<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>重点项目管理系统</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --text: #17212f;
        --muted: #627083;
        --line: #d9e0e8;
        --surface: #ffffff;
        --primary: #1f6feb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(1040px, calc(100% - 40px));
        margin: 0 auto;
        padding: 56px 0;
      }

      header {
        margin-bottom: 28px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 4vw, 46px);
        line-height: 1.15;
      }

      .eyebrow {
        margin-bottom: 10px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        color: var(--primary);
        text-transform: uppercase;
      }

      .project-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }

      .project-card {
        display: flex;
        min-height: 220px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: inherit;
        text-decoration: none;
        flex-direction: column;
        justify-content: space-between;
      }

      .project-card h2 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      .project-card span {
        display: inline-flex;
        width: fit-content;
        margin-top: 22px;
        padding: 10px 14px;
        border-radius: 6px;
        background: var(--primary);
        color: #ffffff;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 28px, 1040px);
          padding: 32px 0;
        }

        .project-list {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">Project Hub</p>
        <h1>重点项目管理系统</h1>
        <p>两个项目保持独立完善，后续通过统一数据结构逐步打通。</p>
      </header>

      <section class="project-list" aria-label="项目入口">
        <a class="project-card" href="./projects/capacity-board/index.html">
          <div>
            <h2>摄影摄像产能看板</h2>
            <p>用于导入、录入、排期和查看摄影摄像任务产能。</p>
          </div>
          <span>进入看板</span>
        </a>

        <a class="project-card" href="./projects/timeline-template/index.html">
          <div>
            <h2>在线项目排期模板</h2>
            <p>用于单个 SKU 下多项目大类、多物料任务的并行排期。</p>
          </div>
          <span>进入模板</span>
        </a>
      </section>
    </main>
  </body>
</html>
